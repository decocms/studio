name: E2E Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mesh

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install nats-server
        run: |
          curl -sL https://github.com/nats-io/nats-server/releases/download/v2.10.24/nats-server-v2.10.24-linux-amd64.tar.gz -o nats-server.tar.gz
          tar xzf nats-server.tar.gz
          sudo mv nats-server-v2.10.24-linux-amd64/nats-server /usr/local/bin/
          rm -rf nats-server.tar.gz nats-server-v2.10.24-linux-amd64
          nats-server --version

      - name: Install dependencies
        run: bun install
        working-directory: .

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Write CI auth config
        run: |
          echo '{"emailAndPassword":{"enabled":true},"socialProviders":{},"saml":{"enabled":false,"providers":[]},"emailProviders":[],"magicLinkConfig":{"enabled":false}}' > auth-config.json

      - name: Create data directory
        run: mkdir -p data

      - name: Start NATS server
        run: nats-server -a 127.0.0.1 --port 4222 --jetstream --store_dir ./data/nats-jetstream &

      - name: Run e2e tests
        run: bun run test:e2e
        env:
          NATS_URL: nats://127.0.0.1:4222
