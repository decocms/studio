name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install

      - name: Run format check
        run: bun run fmt:check

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install

      - name: Run lint
        run: bun run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install

      - name: Run typecheck
        run: bun run check:ci

  test:
    runs-on: ubuntu-latest
    env:
      NATS_URL: nats://localhost:4222
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
        total_shards: [4]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install

      - name: Start NATS with JetStream
        run: |
          docker run -d --name nats -p 4222:4222 nats:2.10 -js
          for i in $(seq 1 10); do nc -z localhost 4222 && break || sleep 1; done

      - name: Run tests (shard ${{ matrix.shard }}/${{ matrix.total_shards }})
        run: |
          files=$(find apps/mesh/src packages -name '*.test.ts' -o -name '*.test.tsx' | sort | awk "NR % ${{ matrix.total_shards }} == ${{ matrix.shard }}")
          echo "Running $(echo "$files" | wc -l) test files"
          echo "$files"
          # Bun 1.3.5 has a known WASM cleanup bug that causes SIGILL (exit 132)
          # after all tests complete. Capture output and check test results directly.
          set +e
          bun test $files 2>&1 | tee /tmp/test-output.txt
          exit_code=${PIPESTATUS[0]}
          set -e
          if [ $exit_code -eq 0 ]; then
            exit 0
          elif [ $exit_code -eq 132 ] && ! grep -q '[1-9][0-9]* fail' /tmp/test-output.txt; then
            echo "⚠️  Bun exited with SIGILL (known PGlite WASM cleanup bug) but all tests passed"
            exit 0
          else
            exit $exit_code
          fi

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install

      - name: Build server bundle
        run: bun run --cwd=apps/mesh build:server

      - name: Verify bundle outputs
        run: |
          test -f apps/mesh/dist/server/server.js
          test -f apps/mesh/dist/server/migrate.js
          test -f apps/mesh/dist/server/cli.js

      - name: Run knip
        run: bun run knip
