{{- if and .Values.otel.enabled .Values.otel.collector.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "chart-deco-studio.fullname" . }}-otel-collector
  labels:
    {{- include "chart-deco-studio.labels" . | nindent 4 }}
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:4317"
          http:
            endpoint: "0.0.0.0:4318"

    processors:
      batch:
        send_batch_size: 1024
        timeout: 5s

    exporters:
      {{- if .Values.otel.endpoint }}
      otlphttp/remote:
        endpoint: {{ .Values.otel.endpoint | quote }}
        {{- if .Values.otel.headers }}
        headers:
          {{- range $key, $value := .Values.otel.headers }}
          {{ $key }}: {{ $value | quote }}
          {{- end }}
        {{- end }}
      {{- end }}

    extensions:
      health_check:
        endpoint: "0.0.0.0:13133"

    service:
      extensions: [health_check]
      pipelines:
        {{- $exporters := list }}
        {{- if .Values.otel.endpoint }}
        {{- $exporters = append $exporters "otlphttp/remote" }}
        {{- end }}
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [{{ join ", " $exporters }}]
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [{{ join ", " $exporters }}]
        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [{{ join ", " $exporters }}]
{{- end }}
