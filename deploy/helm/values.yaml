# Default values for chart-deco-studio.
# The value below is only considered if autoscaling is disabled.
replicaCount: 1

strategy:
  # type: ""  # Leave empty for auto-detection:
  #   - RollingUpdate: if database.engine=postgresql OR persistence.distributed=true OR accessMode=ReadWriteMany
  #   - Recreate: if SQLite with ReadWriteOnce (default)
  # rollingUpdate:
  #   maxSurge: 1
  #   maxUnavailable: 0

image:
  repository: ghcr.io/decocms/studio/studio
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

resources:
  requests:
    memory: "300Mi"
    cpu: "250m"
  limits:
    memory: "600Mi"
    cpu: "500m"

database:
  engine: sqlite # sqlite | postgresql
  url: ""        # Required when engine=postgresql
  caCert: ""     # Optional: Specify existing CA certificate in PEM format

persistence:
  enabled: true
  accessMode: ReadWriteOnce
  storageClass: "gp3"  # Empty string applies default storage class.
  size: 10Gi
  claimName: ""  # Optional: Specify existing PVC name
  distributed: false  # Mark as true if storage offers ReadWriteMany

autoscaling:
  enabled: false
  minReplicas: 3
  maxReplicas: 6
  #targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

configMap:
  meshConfig:
    NODE_ENV: "production"
    PORT: "3000"
    HOST: "0.0.0.0"
    BETTER_AUTH_URL: "http://localhost:8080"
    BASE_URL: "http://localhost:8080"
    DATA_DIR: "/app/data"
    # PRESTOP_HEAP_SNAPSHOT_DIR: ""  # Optional: Directory for heap snapshots during preStop hook
    # NATS_URL: ""  # Optional: overrides auto-derived URL when nats.enabled=true (e.g. nats://my-nats:4222)
    DECO_AI_GATEWAY_ENABLED: "false"
  authConfig:
    emailAndPassword:
      enabled: true


secret:
  # secretName: ""  # If defined, uses this existing secret (does not create new secret)
  # Generate secret with the following command: openssl rand -base64 32
  BETTER_AUTH_SECRET: "define_your_secret_with_command_above"

volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

extraContainers: []
# - name: cloudsql-proxy
#   image: gcr.io/cloudsql-docker/gce-proxy:1.33.1
#   args:
#     - "/cloud_sql_proxy"
#     - "-instances=PROJECT:REGION:INSTANCE=tcp:5432"

volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

podSecurityContext:
  fsGroup: 1001
  fsGroupChangePolicy: "OnRootMismatch"

securityContext:
  runAsNonRoot: true
  runAsUser: 1001
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 4

# Optional lifecycle hooks (preStop, postStart)
# lifecycle:
#   preStop:
#     exec:
#       command:
#         - /bin/sh
#         - -c
#         - "wget -q -O - http://localhost:9229/prestop-hook || true"

nodeSelector:
  kubernetes.io/arch: amd64

tolerations: []
# Example:
# tolerations:
#   - key: "env"
#     operator: "Equal"
#     value: "dev"
#     effect: "NoSchedule"

affinity: {}
# Example:
# affinity:
#   podAntiAffinity:
#     preferredDuringSchedulingIgnoredDuringExecution:
#       - weight: 100
#         podAffinityTerm:
#           labelSelector:
#             matchLabels:
#               app.kubernetes.io/name: chart-deco-studio
#           topologyKey: kubernetes.io/hostname

# Topology Spread Constraints (optional - leave empty [] to disable)
# IMPORTANT: labelSelector is required when topologySpreadConstraints is configured
#topologySpreadConstraints: []
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: chart-deco-studio
        app.kubernetes.io/instance: deco-studio

# OpenTelemetry configuration (optional)
otel:
  enabled: false
  protocol: "http/protobuf"  # http/protobuf | grpc
  service: ""                # OTEL_SERVICE_NAME
  endpoint: ""               # Remote OTLP endpoint (direct export OR collector fan-out target)
  headers: {}                # OTEL_EXPORTER_OTLP_HEADERS (key=value format)
  # headers:
  #   authorization: "Bearer your-token"
  #   x-custom-header: "value"
  attributes: {}             # OTEL_RESOURCE_ATTRIBUTES (key=value format)
  # attributes:
  #   deployment.environment: "production"
  #   service.namespace: "my-namespace"

  # OTel Collector sidecar — when enabled, app exports to localhost:4318
  collector:
    enabled: false
    image:
      repository: otel/opentelemetry-collector-contrib
      tag: "0.115.1"
      pullPolicy: IfNotPresent
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "250m"

# S3 file sync sidecar — syncs /app/data/{logs,traces,metrics} to S3
s3Sync:
  enabled: false
  image:
    repository: amazon/aws-cli
    tag: "latest"
    pullPolicy: IfNotPresent
  bucket: ""               # Required when enabled
  region: "us-east-1"
  prefix: ""               # S3 key prefix (e.g. "studio/production")
  interval: 30             # Polling interval in seconds
  roleArn: ""              # IRSA role ARN — adds eks.amazonaws.com/role-arn to ServiceAccount
  syncDirs:                # Directories under /app/data to sync
    - logs
    - traces
    - metrics
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"

# NATS subchart (https://artifacthub.io/packages/helm/nats/nats)
# When enabled, NATS_URL is automatically set to nats://<release-name>-nats:4222
# unless overridden via configMap.meshConfig.NATS_URL
nats:
  enabled: true
  config:
    jetstream:
      enabled: true
      memoryStore:
        enabled: true
        maxSize: 1Gi
      fileStore:
        enabled: true
        pvc:
          enabled: true
          size: 10Gi
          storageClassName: ""  # empty = use cluster default StorageClass

# Additional environment variables (merged with existing envs)
env: []
# env:
#   - name: MY_CUSTOM_VAR
#     value: "my-value"
#   - name: MY_SECRET_VAR
#     valueFrom:
#       secretKeyRef:
#         name: my-secret
#         key: my-key
